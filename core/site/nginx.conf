server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # install.sh — served as plain text, short cache
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "public, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Landing page — short cache
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Docs pages (Astro output) — try with trailing /index.html
    location /docs/ {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Changelog
    location /changelog {
        try_files $uri $uri/ $uri/index.html /changelog/index.html =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Sitemap
    location ~* sitemap.*\.xml$ {
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Static assets — long cache (SVG, CSS, JS, fonts, images)
    location ~* \.(css|js|png|svg|ico|woff2)$ {
        add_header Cache-Control "public, max-age=86400, immutable";
    }
    
    # Health check for k8s probes
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
    
    # Deny everything else
    location / {
        return 404;
    }
}
