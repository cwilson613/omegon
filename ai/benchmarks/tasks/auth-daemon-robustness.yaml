id: auth-daemon-robustness
kind: implementation
repo: .
base_ref: d2178aafb94263616c6574d26804f72520efb4a5
model: anthropic:claude-sonnet-4-6
slim: false
prompt: |
  Make remote auth logout robust for canonical provider aliases and ensure the daemon control plane still starts even when no executable LLM provider is configured. Keep the control plane available so remote tooling and blackbox tests can attach, and make logout safe to invoke even when the provider is already effectively logged out.
harnesses:
  - omegon
  - claude-code
  - pi
acceptance:
  required:
    - cargo test -p omegon remote_slash_logout_accepts_openai_codex_provider --manifest-path core/Cargo.toml -- --nocapture
    - cargo test -p omegon --test daemon_serve_blackbox --manifest-path core/Cargo.toml -- --nocapture
success_files:
  - core/crates/omegon/src/auth.rs
  - core/crates/omegon/src/main.rs
budget:
  max_turns: 25
  max_minutes: 30
process_expectations:
  must_preserve_control_plane_startup: true
  must_handle_canonical_provider_aliases: true
notes: |
  Light benchmark rung C-lite: cross-surface runtime robustness.
  This task is still small enough for routine RC benchmarking, but it spans auth semantics and daemon startup behavior.
